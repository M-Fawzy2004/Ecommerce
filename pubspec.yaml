name: ecommerce_app
description: "A Flutter E-commerce app built with Clean Architecture."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  dio: ^5.7.0
  easy_localization: ^3.0.7
  equatable: ^2.0.5
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  flutter_screenutil: ^5.9.3
  flutter_secure_storage: ^9.2.2
  flutter_svg: ^2.0.10+1
  freezed_annotation: ^2.4.4
  get_it: ^8.0.2
  go_router: ^14.6.1
  iconly: ^1.0.1
  injectable: ^2.5.0
  internet_connection_checker_plus: ^2.5.1
  intl: ^0.20.2
  json_annotation: ^4.9.0
  pretty_dio_logger: ^1.4.0
  shared_preferences: ^2.3.3
  shimmer: ^3.0.0

dev_dependencies:

  # ── Code Generation ──────────────────────────────────
  build_runner: ^2.4.13
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  freezed: ^2.5.7
  injectable_generator: ^2.7.0
  json_serializable: ^6.8.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/translations/
    - assets/images/icons/
    - assets/images/svg/
    - assets/lottie/
  # ── Flutter Assets ───────────────────────────────────
flutter_assets:
  assets_path: assets/images/
  output_path: lib/core/utils/
  filename: assets.dart
  field_prefix: null

  generate: true
