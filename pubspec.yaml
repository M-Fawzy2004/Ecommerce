name: ecommerce_app
description: "A Flutter E-commerce app built with Clean Architecture."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # ── UI ──────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3        # Responsive sizing
  flutter_svg: ^2.0.10+1            # SVG assets
  cached_network_image: ^3.4.1      # Image caching
  shimmer: ^3.0.0                   # Loading skeletons

  # ── State Management ────────────────────────────────
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # ── Dependency Injection ─────────────────────────────
  get_it: ^8.0.2

  # ── Networking ───────────────────────────────────────
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0
  internet_connection_checker_plus: ^2.5.1

  # ── Local Storage ────────────────────────────────────
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # ── Functional Programming ───────────────────────────
  dartz: ^0.10.1

  # ── Navigation ───────────────────────────────────────
  go_router: ^14.6.1

  # ── Localization ─────────────────────────────────────
  easy_localization: ^3.0.7

  # ── Utilities ────────────────────────────────────────
  injectable: ^2.5.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  intl: ^0.20.2 # Updated to match flutter SDK requirements

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # ── Code Generation ──────────────────────────────────
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  injectable_generator: ^2.7.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/translations/
    - assets/images/
    - assets/icons/
    - assets/lottie/

  # ── Flutter Assets ───────────────────────────────────
flutter_assets:
  assets_path: assets/images/
  output_path: lib/core/utils/
  filename: assets.dart
  field_prefix: null

  generate: true